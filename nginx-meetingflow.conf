# MeetingFlow AI nginx reverse proxy for Oracle E2.1.Micro.
#
# OCI 서버에 설치 방법:
#   sudo cp ~/meeting-flow/nginx-meetingflow.conf /etc/nginx/sites-available/meetingflow-ai
#   sudo vi /etc/nginx/sites-available/meetingflow-ai
#   # __FRONTEND_DOMAIN__ 과 __API_DOMAIN__ 부분을 실제 도메인으로 변경
#   sudo ln -sf /etc/nginx/sites-available/meetingflow-ai /etc/nginx/sites-enabled/meetingflow-ai
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# 권장 DNS 구성:
#   __FRONTEND_DOMAIN__ -> 프론트엔드 앱, 127.0.0.1:3000 으로 프록시 연결됨
#   __API_DOMAIN__      -> FastAPI 백엔드, 127.0.0.1:8000 으로 프록시 연결됨
#
# Cloudflare(클라우드플레어)에서 HTTPS를 종결(설정)하는 경우, 이 HTTP 오리진 설정으로 충분
# Nginx에서 HTTPS를 직접 종결(설정)하는 경우, certbot을 사용:
#   sudo certbot --nginx -d __FRONTEND_DOMAIN__ -d __API_DOMAIN__

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_x_forwarded_proto $meetingflow_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}
 
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $meetingflow_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_redirect  off;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name __API_DOMAIN__;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $meetingflow_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_redirect  off;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
