# MeetingFlow AI single-domain nginx reverse proxy.
#
# Use this when you only have one public domain, for example:
#   02-demo.aiweb2026.site
#
# Routing:
#   /                         -> Next.js frontend at 127.0.0.1:3000
#   /auth, /meetings, ...     -> FastAPI backend at 127.0.0.1:8000
#
# Install on the OCI server:
#   sudo cp ~/meeting-flow/meetingflow-ai/nginx-meetingflow-single-domain.conf /etc/nginx/sites-available/meetingflow-ai
#   sudo vi /etc/nginx/sites-available/meetingflow-ai
#   # Replace __DOMAIN__ with your domain.
#   sudo ln -sf /etc/nginx/sites-available/meetingflow-ai /etc/nginx/sites-enabled/meetingflow-ai
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_x_forwarded_proto $meetingflow_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    client_max_body_size 25M;

    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $meetingflow_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
    }

    location ~ ^/(auth|teams|meetings|action-items|integrations)(/|$) {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $meetingflow_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_redirect  off;

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $meetingflow_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_redirect  off;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
